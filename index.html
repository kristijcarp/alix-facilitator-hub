<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlixPartners Facilitator Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #003d7a 0%, #0055b8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #003d7a 0%, #0055b8 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.95;
            font-size: 14px;
        }
        
        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-group input,
        .control-group select,
        .control-group button {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .control-group button {
            background: #0055b8;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .control-group button:hover {
            background: #003d7a;
        }
        
        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #0055b8;
            box-shadow: 0 0 0 3px rgba(0, 85, 184, 0.1);
        }
        
        .content {
            padding: 20px;
            min-height: 400px;
        }
        
        .session-card {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            border-left: 4px solid #0055b8;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .session-card h3 {
            color: #003d7a;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .badges {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-program {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .badge-placemat {
            background: #f3e5f5;
            color: #6a1b9a;
        }
        
        .badge-modality {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .facilitators {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .facilitator-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
        }
        
        .facilitator-item strong {
            display: block;
            color: #003d7a;
            margin-bottom: 4px;
        }
        
        .facilitator-item .email {
            color: #0055b8;
            text-decoration: none;
            word-break: break-all;
        }
        
        .facilitator-item .details {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .facilitator-item .detail-badge {
            background: #f0f2f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
        }
        
        .session-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #0055b8;
            color: white;
        }
        
        .btn-primary:hover {
            background: #003d7a;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #ffebee;
            border: 1px solid #ef5350;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .stats {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            text-align: center;
        }
        
        .stat {
            padding: 10px;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #0055b8;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            color: #003d7a;
        }
        
        .modal-content .form-group {
            margin-bottom: 15px;
        }
        
        .modal-content label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 14px;
        }
        
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        
        .modal-buttons .btn-primary {
            background: #0055b8;
            color: white;
        }
        
        .modal-buttons .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .last-updated {
            text-align: right;
            font-size: 12px;
            color: #999;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 AlixPartners Facilitator Hub</h1>
            <p>Master Facilitator Roster & Session Management</p>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>Search Session/Program</label>
                <input type="text" id="searchInput" placeholder="Type to search...">
            </div>
            <div class="control-group">
                <label>Program</label>
                <select id="programFilter">
                    <option value="">All Programs</option>
                </select>
            </div>
            <div class="control-group">
                <label>Placemat</label>
                <select id="placematFilter">
                    <option value="">All Placemats</option>
                </select>
            </div>
            <div class="control-group">
                <button onclick="openNewSessionModal()">+ New Session</button>
            </div>
        </div>
        
        <div class="content">
            <div id="loadingMessage" class="loading">Loading facilitators from Monday.com...</div>
            <div id="errorMessage" class="error" style="display:none;"></div>
            <div id="sessionsContainer"></div>
            <div id="noResults" class="no-results" style="display:none;">No sessions found matching your criteria.</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalSessions">0</div>
                <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalFacilitators">0</div>
                <div class="stat-label">Facilitators</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalPrograms">0</div>
                <div class="stat-label">Programs</div>
            </div>
        </div>
        
        <div class="last-updated">
            <span id="lastUpdated"></span>
        </div>
    </div>
    
    <!-- New Session Modal -->
    <div id="newSessionModal" class="modal">
        <div class="modal-content">
            <h2>Create New Session</h2>
            <div class="form-group">
                <label>Session Name *</label>
                <input type="text" id="sessionName" placeholder="e.g., Day 1: Introduction">
            </div>
            <div class="form-group">
                <label>Program *</label>
                <select id="newSessionProgram"></select>
            </div>
            <div class="form-group">
                <label>Placemat *</label>
                <select id="newSessionPlacemat">
                    <option value="">Select placemat...</option>
                    <option value="Early Career">Early Career</option>
                    <option value="Leadership & Succession">Leadership & Succession</option>
                    <option value="Commercial Capability">Commercial Capability</option>
                    <option value="People Dev: Mainstream">People Dev: Mainstream</option>
                    <option value="Digital & Virtual">Digital & Virtual</option>
                    <option value="Orientations & Core">Orientations & Core</option>
                </select>
            </div>
            <div class="form-group">
                <label>Modality</label>
                <select id="newSessionModality">
                    <option value="In-Person">In-Person</option>
                    <option value="Virtual">Virtual</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeNewSessionModal()">Cancel</button>
                <button class="btn-primary" onclick="createSession()">Create Session</button>
            </div>
        </div>
    </div>
    
    <!-- Assign Facilitator Modal -->
    <div id="assignModal" class="modal">
        <div class="modal-content">
            <h2 id="assignTitle">Assign Facilitator</h2>
            <div class="form-group">
                <label>Select Facilitator *</label>
                <select id="facilitatorSelect"></select>
            </div>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeAssignModal()">Cancel</button>
                <button class="btn-primary" onclick="assignFacilitator()">Assign</button>
            </div>
        </div>
    </div>

    <script>
        const MONDAY_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY4MDkzNTg2MCwiYWFpIjoxMSwidWlkIjo1NTAzNTE4MCwiaWQiOiIyMDI2LTA3LTA5VDIyOjA5OjEzLjUzOFoiLCJwZXIiOiJtZTp3cml0ZSIsImFjdGlkIjoxNDY5NTg4OSwicmduIjoidXNlMSJ9.fXpRL7-aJQz5mA9Pv-o83RHrBCqc8j6z9_n8zsk2vcg';
        const PARENT_BOARD_ID = 18412388048;
        const SUBITEM_BOARD_ID = 18412388745;
        const MONDAY_API_URL = 'https://api.monday.com/v2';
        const COLUMNS = {
            program: 'dropdown_mm35eypj',
            modality: 'dropdown_mm35m8v0',
            placemat: 'text_mm35qcsk',
            tier: 'dropdown_mm355da9',
            role: 'dropdown_mm35mgfm',
            email: 'email_mm35jpv5',
            level: 'text_mm356jcv',
            office: 'text_mm35zm6v',
        };
        
        let sessions = [];
        let facilitators = [];
        let selectedSessionForAssign = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('input', filterAndRender);
            document.getElementById('programFilter').addEventListener('change', filterAndRender);
            document.getElementById('placematFilter').addEventListener('change', filterAndRender);
            loadData();
            setInterval(loadData, 5 * 60 * 1000);
        });
        
        async function loadData() {
            try {
                document.getElementById('errorMessage').style.display = 'none';
                
                const sessionQuery = `query {boards(ids: [${PARENT_BOARD_ID}]) {items_page(limit: 500) {items {id name group { title } column_values(ids: ["${COLUMNS.program}", "${COLUMNS.placemat}", "${COLUMNS.modality}"]) {id text}}}}}`;
                
                const sessionRes = await fetch(MONDAY_API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': MONDAY_TOKEN},
                    body: JSON.stringify({ query: sessionQuery })
                });
                
                const sessionData = await sessionRes.json();
                if (sessionData.errors) throw new Error(sessionData.errors[0].message);
                
                const facilQuery = `query {boards(ids: [${SUBITEM_BOARD_ID}]) {items_page(limit: 500) {items {id name parent_item { id } column_values(ids: ["${COLUMNS.tier}", "${COLUMNS.role}", "${COLUMNS.email}", "${COLUMNS.level}", "${COLUMNS.office}"]) {id text}}}}}`;
                
                const facilRes = await fetch(MONDAY_API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': MONDAY_TOKEN},
                    body: JSON.stringify({ query: facilQuery })
                });
                
                const facilData = await facilRes.json();
                if (facilData.errors) throw new Error(facilData.errors[0].message);
                
                sessions = (sessionData.data?.boards[0]?.items_page?.items || []).map(item => ({
                    id: item.id,
                    name: item.name,
                    program: item.column_values.find(cv => cv.id === COLUMNS.program)?.text || '',
                    placemat: item.column_values.find(cv => cv.id === COLUMNS.placemat)?.text || '',
                    modality: item.column_values.find(cv => cv.id === COLUMNS.modality)?.text || '',
                }));
                
                facilitators = (facilData.data?.boards[0]?.items_page?.items || []).map(item => ({
                    id: item.id,
                    name: item.name,
                    parentItemId: item.parent_item?.id,
                    role: item.column_values.find(cv => cv.id === COLUMNS.role)?.text || '',
                    email: item.column_values.find(cv => cv.id === COLUMNS.email)?.text || '',
                    level: item.column_values.find(cv => cv.id === COLUMNS.level)?.text || '',
                    office: item.column_values.find(cv => cv.id === COLUMNS.office)?.text || ''
                }));
                
                updateFilters();
                filterAndRender();
                updateStats();
                document.getElementById('lastUpdated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
                document.getElementById('loadingMessage').style.display = 'none';
            } catch (err) {
                document.getElementById('errorMessage').textContent = '⚠️ Error: ' + err.message;
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('loadingMessage').style.display = 'none';
            }
        }
        
        function updateFilters() {
            const programs = [...new Set(sessions.map(s => s.program))].filter(Boolean).sort();
            const placemats = [...new Set(sessions.map(s => s.placemat))].filter(Boolean).sort();
            
            document.getElementById('programFilter').innerHTML = '<option value="">All Programs</option>' + programs.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('placematFilter').innerHTML = '<option value="">All Placemats</option>' + placemats.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('newSessionProgram').innerHTML = '<option value="">Select a program...</option>' + programs.map(p => `<option value="${p}">${p}</option>`).join('');
        }
        
        function filterAndRender() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const programFilter = document.getElementById('programFilter').value;
            const placematFilter = document.getElementById('placematFilter').value;
            
            const filtered = sessions.filter(s => {
                const matchSearch = s.name.toLowerCase().includes(search) || s.program.toLowerCase().includes(search);
                const matchProgram = !programFilter || s.program === programFilter;
                const matchPlacemat = !placematFilter || s.placemat === placematFilter;
                return matchSearch && matchProgram && matchPlacemat;
            });
            
            const container = document.getElementById('sessionsContainer');
            container.innerHTML = filtered.map(session => {
                const sessionFacils = getFacilitatorsBySession(session.id);
                return `<div class="session-card">
                    <h3>${session.name}</h3>
                    <div class="badges">
                        <span class="badge badge-program">${session.program}</span>
                        <span class="badge badge-placemat">${session.placemat}</span>
                        <span class="badge badge-modality">${session.modality}</span>
                    </div>
                    ${sessionFacils.length === 0 ? '<div style="color:#999;margin-bottom:15px;font-style:italic;">No facilitators assigned yet</div>' : 
                        `<div class="facilitators">${sessionFacils.map(fac => `<div class="facilitator-item"><strong>${fac.name}</strong><a href="mailto:${fac.email}" class="email">${fac.email}</a><div class="details">${fac.role ? `<span class="detail-badge">${fac.role}</span>` : ''}${fac.level ? `<span class="detail-badge">${fac.level}</span>` : ''}${fac.office ? `<span class="detail-badge">📍 ${fac.office}</span>` : ''}</div></div>`).join('')}</div>`
                    }
                    <div class="session-actions">
                        <button class="btn btn-primary" onclick="openAssignModal('${session.id}')">+ Assign Facilitator</button>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('sessionsContainer').style.display = filtered.length === 0 ? 'none' : 'block';
            document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
        }
        
        function getFacilitatorsBySession(sessionId) {
            return facilitators.filter(f => f.parentItemId === sessionId);
        }
        
        function updateStats() {
            document.getElementById('totalSessions').textContent = sessions.length;
            document.getElementById('totalFacilitators').textContent = facilitators.length;
            document.getElementById('totalPrograms').textContent = new Set(sessions.map(s => s.program)).size;
        }
        
        function openNewSessionModal() { document.getElementById('newSessionModal').classList.add('active'); }
        function closeNewSessionModal() { document.getElementById('newSessionModal').classList.remove('active'); document.getElementById('sessionName').value = ''; }
        function openAssignModal(sessionId) {
            selectedSessionForAssign = sessions.find(s => s.id === sessionId);
            document.getElementById('assignTitle').textContent = `Assign Facilitator to: ${selectedSessionForAssign.name}`;
            const assigned = getFacilitatorsBySession(sessionId).map(f => f.id);
            const available = facilitators.filter(f => !assigned.includes(f.id));
            document.getElementById('facilitatorSelect').innerHTML = available.map(f => `<option value="${f.id}">${f.name} ${f.level ? '(' + f.level + ')' : ''}</option>`).join('');
            document.getElementById('assignModal').classList.add('active');
        }
        function closeAssignModal() { document.getElementById('assignModal').classList.remove('active'); }
        
        async function createSession() {
            const name = document.getElementById('sessionName').value;
            const program = document.getElementById('newSessionProgram').value;
            const placemat = document.getElementById('newSessionPlacemat').value;
            if (!name || !program || !placemat) { alert('Please fill in all required fields'); return; }
            try {
                const mutation = `mutation {create_item(board_id: ${PARENT_BOARD_ID} item_name: "${name.replace(/"/g, '\\"')}" column_values: "{\\"${COLUMNS.program}\\": \\"${program}\\", \\"${COLUMNS.placemat}\\": \\"${placemat}\\"}") { id }}`;
                const res = await fetch(MONDAY_API_URL, {method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': MONDAY_TOKEN}, body: JSON.stringify({ query: mutation })});
                const data = await res.json();
                if (data.errors) throw new Error(data.errors[0].message);
                closeNewSessionModal();
                loadData();
            } catch (err) { alert('Error: ' + err.message); }
        }
        
        async function assignFacilitator() {
            const facilId = document.getElementById('facilitatorSelect').value;
            if (!facilId || !selectedSessionForAssign) return;
            const fac = facilitators.find(f => f.id === facilId);
            try {
                const mutation = `mutation {create_subitem(parent_item_id: ${selectedSessionForAssign.id} item_name: "${fac.name.replace(/"/g, '\\"')}" column_values: "{\\"${COLUMNS.tier}\\": \\"Primary\\", \\"${COLUMNS.role}\\": \\"Facilitator\\"}") { id }}`;
                const res = await fetch(MONDAY_API_URL, {method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': MONDAY_TOKEN}, body: JSON.stringify({ query: mutation })});
                const data = await res.json();
                if (data.errors) throw new Error(data.errors[0].message);
                closeAssignModal();
                loadData();
            } catch (err) { alert('Error: ' + err.message); }
        }
    </script>
</body>
</html>
